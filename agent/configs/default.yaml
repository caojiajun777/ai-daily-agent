run:
  timezone: "Asia/Shanghai"
  max_items_collect: 200
  max_items_curate: 24
  language: "zh-CN"
  enable_vision_enrichment: true

llm:
  default_provider: "deepseek"
  default_model: "deepseek-v4-pro"
  temperature: 0.3
  max_output_tokens: 8000
  request_timeout_s: 180
  max_retries: 0
  sem_dup_max_tokens: 2048
  repair_max_tokens: 2048

budget:
  max_total_input_tokens: 200000
  max_total_output_tokens: 30000
  max_total_calls: 40
  hard_fail_on_exceed: true
  # Token Budget Policy: prevent source expansion from exploding LLM tokens
  max_total_context_tokens: 8000
  max_writer_input_tokens: 6000
  max_writer_output_tokens: 3500
  max_daily_llm_calls: 8
  max_daily_estimated_cost_usd: 0.05

token_budget:
  max_raw_items_per_run: 800
  max_candidates_after_filter: 120
  max_clusters_after_dedup: 60
  max_writer_items: 18
  max_items_per_section: 4
  max_snippet_chars: 500
  budget_overflow_drop_order:
    - community_signal
    - market_commentary
    - vc_signal
    - cn_aggregator
    - tech_media
    - insider_reporter_signal
  budget_overflow_keep:
    - official_release
    - pricing_page
    - benchmark_tracker
    - research_paper
    - china_model_official
    - china_model_pricing

context:
  max_messages_keep: 20
  per_message_max_chars: 6000

eval:
  min_unique_titles_ratio: 0.8
  min_section_count: 6
  forbid_phrases:
    - "作为AI"
    - "I cannot"
    - "Lorem ipsum"

content_types:
  # ── Official sources ──
  official_release:
    source_weight: 1.35
    half_life_h: 48
  official_docs:
    source_weight: 1.35
    half_life_h: 168
  pricing_page:
    source_weight: 1.35
    half_life_h: 168
  # ── Research ──
  research_paper:
    source_weight: 1.05
    half_life_h: 120
  github_release:
    source_weight: 0.95
    half_life_h: 72
  # ── China model vendors ──
  china_model_official:
    source_weight: 1.25
    half_life_h: 48
  china_model_docs:
    source_weight: 1.30
    half_life_h: 168
  china_model_pricing:
    source_weight: 1.35
    half_life_h: 168
  china_product_changelog:
    source_weight: 1.00
    half_life_h: 72
  china_ecosystem_signal:
    source_weight: 0.80
    half_life_h: 48
  # ── Benchmark & Product ──
  benchmark_tracker:
    source_weight: 1.20
    half_life_h: 72
  product_changelog:
    source_weight: 1.00
    half_life_h: 72
  # ── Infra & Finance ──
  infra_signal:
    source_weight: 1.10
    half_life_h: 120
  financial_report:
    source_weight: 1.30
    half_life_h: 120
  # ── People signals ──
  founder_signal:
    source_weight: 1.00
    half_life_h: 36
  researcher_signal:
    source_weight: 0.95
    half_life_h: 72
  expert_signal:
    source_weight: 0.90
    half_life_h: 72
  expert_newsletter:
    source_weight: 0.90
    half_life_h: 96
  builder_signal:
    source_weight: 0.90
    half_life_h: 72
  # ── Insider & VC ──
  insider_media:
    source_weight: 1.05
    half_life_h: 72
  insider_reporter_signal:
    source_weight: 0.95
    half_life_h: 36
  vc_signal:
    source_weight: 0.80
    half_life_h: 36
  # ── Safety ──
  safety_eval:
    source_weight: 1.00
    half_life_h: 120
  # ── Media & Community ──
  tech_media:
    source_weight: 0.85
    half_life_h: 36
  cn_aggregator:
    source_weight: 0.65
    half_life_h: 36
  community_signal:
    source_weight: 0.75
    half_life_h: 24
  market_commentary:
    source_weight: 0.65
    half_life_h: 24

curation:
  mode: "research_editor"   # rules_only | research_editor | legacy_llm_scoring
  candidate_top_k: 40
  final_min_items: 16
  final_max_items: 22
  history_window_days: 7
  fallback_to_rules: true
  legacy_llm_scoring_enabled: false
  enable_evidence_fetch: false   # off by default — adds ~20s per run
  evidence_fetch_timeout_sec: 8
  llm_rerank_timeout_sec: 60
  score_floor: 0.10

section_quotas:
  research_frontier:
    min: 2
    max: 4

publish:
  # Publish gate: a draft must clear ALL of these before an issue is created.
  minimum_items: 3
  max_eval_issues: 0
  require_critic_pass: true
  # Duplicate protection: when querying recent issues we look at this many.
  recent_issues_to_check: 30
  # Title prefix; final title is "<prefix><date>" e.g. "AI 早报 2026-05-09".
  title_prefix: "AI 日报 "
  # Labels applied to the created issue. Can be overridden by env
  # PUBLISH_ISSUE_LABELS (comma-separated).
  default_labels:
    - "agent-generated"
  # Email subscribers (comma-separated in env EMAIL_SUBSCRIBERS overrides this).
  subscribers:
    - "905562805@qq.com"
    - "1780609071@qq.com"

