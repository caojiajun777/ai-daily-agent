name: Agent — Daily Run & Publish

# Runs every day at 10:17 Beijing time (UTC 02:17), then waits until
# 12:00 Beijing time before publishing. This gives the LLM pipeline time
# to collect, curate, repair, and pass gates while keeping the public
# issue/email release at noon.
#
# Token policy: PUBLISH_TOKEN must be the repo owner's PAT.
# Issues created by github-actions[bot] lack proper authorship for audit
# attribution. GITHUB_TOKEN is explicitly refused by the publisher.
#
# Required repository secrets:
#   DEEPSEEK_API_KEY       — DeepSeek API key for the LLM run
#   PUBLISH_TOKEN   — Repo owner PAT with issues:write scope
#   PUBLISH_REPO           — Target repo, e.g. "caojiajun777/ai-daily-agent"
#   PUBLISH_ISSUE_LABELS   — Comma-separated labels, e.g. "ai-daily,agent-generated"
#   X_BEARER_TOKEN         — (optional) X API v2 Bearer Token for social-graph diffusion
#   SMTP_USER              — sender email, e.g. 905562805@qq.com
#   SMTP_PASSWORD          — QQ邮箱 SMTP 授权码 (NOT QQ password)

on:
  schedule:
    - cron: "17 2 * * *"  # 10:17 CST = 02:17 UTC; avoid top-of-hour schedule drops
  workflow_dispatch:
    inputs:
      date:
        description: "Override logical date (YYYY-MM-DD). Defaults to today (Asia/Shanghai)."
        required: false
        type: string
      dry_run:
        description: "Preview only — do not create the GitHub issue."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  daily-report:
    name: Generate & publish daily report
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GITHUB_PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      PUBLISH_REPO: ${{ secrets.PUBLISH_REPO }}
      PUBLISH_ISSUE_LABELS: ${{ secrets.PUBLISH_ISSUE_LABELS }}
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_SUBSCRIBERS: ${{ secrets.EMAIL_SUBSCRIBERS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve report date
        id: date
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "date=${{ inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(TZ=Asia/Shanghai date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      # ─────────────────────────────────────────────────────────
      # Stage 1: Run the daily AI report pipeline
      # ─────────────────────────────────────────────────────────
      - name: Run pipeline
        run: |
          python -m agent.cli run \
            --provider deepseek \
            --date "${{ steps.date.outputs.date }}"

      # ─────────────────────────────────────────────────────────
      # Stage 2: Publish to GitHub Issues
      # ─────────────────────────────────────────────────────────
      - name: Publish (dry-run preview)
        if: ${{ inputs.dry_run == 'true' }}
        run: |
          python -m agent.cli publish-issue \
            --run-id "${{ steps.date.outputs.date }}" \
            --dry-run

      - name: Wait until noon Beijing time
        if: ${{ inputs.dry_run != 'true' }}
        shell: bash
        run: |
          TARGET_TS=$(TZ=Asia/Shanghai date -d "$(TZ=Asia/Shanghai date +%Y-%m-%d) 12:00:00" +%s)
          NOW_TS=$(date +%s)
          WAIT_SECONDS=$(( TARGET_TS - NOW_TS ))
          if [ "$WAIT_SECONDS" -gt 0 ]; then
            echo "Waiting ${WAIT_SECONDS}s so publish happens at 12:00 Asia/Shanghai."
            sleep "$WAIT_SECONDS"
          else
            echo "No wait needed; target publish time has passed."
          fi

      - name: Publish (confirmed)
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          python -m agent.cli publish-issue \
            --run-id "${{ steps.date.outputs.date }}" \
            --confirm \
            --force-dup

      # ─────────────────────────────────────────────────────────
      # Stage 3: Source Scout + Auto-Admit
      #
      # Runs after publish so content-link diffusion has today's
      # collected items as seeds. Uses deepseek-chat (non-reasoning)
      # for LLM discovery. Auto-admits new sources at low weight
      # into a separate auto_sources.yaml.
      # ─────────────────────────────────────────────────────────
      - name: Discover new sources (scout)
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          mkdir -p artifacts/reports
          python -m agent.cli scout \
            --topic broad \
            --provider deepseek \
            --model deepseek-v4-flash \
            --skip-model-check \
            --run-id "${{ steps.date.outputs.date }}" \
            --json \
            > "artifacts/reports/scout_${{ steps.date.outputs.date }}.json" || true
          echo "Scout report saved."

      - name: Auto-admit discovered sources
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          echo "=== Auto-admit preview ==="
          python -m agent.cli admit-sources \
            --scout-report "artifacts/reports/scout_${{ steps.date.outputs.date }}.json" \
            --dry-run 2>&1 || true
          echo "=== Run with --confirm to actually add sources ==="

      - name: Install Chinese fonts + Playwright browser
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk
          python -m playwright install chromium

      - name: Send PDF via email
        if: ${{ inputs.dry_run != 'true' }}
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python -m agent.cli send --run-id "${{ steps.date.outputs.date }}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-daily-${{ steps.date.outputs.date }}
          retention-days: 30
          path: |
            artifacts/drafts/${{ steps.date.outputs.date }}.md
            artifacts/drafts/${{ steps.date.outputs.date }}.json
            artifacts/drafts/${{ steps.date.outputs.date }}_v1.md
            artifacts/drafts/${{ steps.date.outputs.date }}_v2.md
            artifacts/reports/${{ steps.date.outputs.date }}.json
            artifacts/reports/publish_result_${{ steps.date.outputs.date }}.json
            artifacts/reports/semantic_duplicates_${{ steps.date.outputs.date }}.json
            artifacts/reports/repair_${{ steps.date.outputs.date }}.json
            artifacts/reports/scout_${{ steps.date.outputs.date }}.json
            artifacts/curated/${{ steps.date.outputs.date }}.json
            artifacts/traces/${{ steps.date.outputs.date }}.jsonl
          if-no-files-found: warn
